<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0B0B14" />
    <title>Streeps — streepjes voor vriendengroepen</title>
    <meta name="description" content="Streeps houdt streepjes bij voor jouw vriendengroep. Rondjes, afrekeningen en een beetje chaos in een app." />
    <meta property="og:title" content="Streeps" />
    <meta property="og:description" content="Streepjes voor vriendengroepen." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://streeps.app" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root {
        --bg: #0b0b14;
        --fg: #ffffff;
        --muted: #848494;
        --accent: #ff0085;
        --accent2: #00beae;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; -webkit-font-smoothing: antialiased; }
      body { min-height: 100svh; display: grid; place-items: center; padding: 24px; }
      main { max-width: 560px; text-align: center; }
      .logo { font-size: 56px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(120deg, var(--accent), var(--accent2)); -webkit-background-clip: text; background-clip: text; color: transparent; margin: 0 0 12px; }
      .tagline { color: var(--muted); font-size: 18px; margin: 0 0 40px; }
      .cta { display: inline-flex; align-items: center; gap: 10px; padding: 14px 22px; background: var(--fg); color: var(--bg); border-radius: 999px; font-weight: 600; text-decoration: none; font-size: 15px; transition: transform 0.15s ease; }
      .cta:hover { transform: translateY(-1px); }
      .foot { margin-top: 40px; color: var(--muted); font-size: 13px; }
      .foot a { color: var(--muted); text-decoration: underline; }
    </style>
  </head>
  <body>
    <main>
      <h1 class="logo">Streeps</h1>
      <p class="tagline">Streepjes voor vriendengroepen. Rondjes, afrekeningen, en een beetje chaos.</p>
      <a class="cta" href="#">Binnenkort in de App Store</a>
      <p class="foot">Contact: <a href="mailto:hallo@streeps.app">hallo@streeps.app</a></p>
    </main>
  </body>
</html>
